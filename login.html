<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Athlete Data Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="login-page">
  <header class="landing-header login-header">
    <a href="/" class="logo">Athlete Data Co.</a>
    <nav class="landing-nav">
      <a href="/deck.html" class="nav-btn-deck" id="nav-deck-link">DECK</a>
      <a href="/login.html" class="nav-btn-login nav-btn-login--active" aria-current="page">LOGIN</a>
    </nav>
  </header>

  <main class="login-main">
    <div class="login-card">
      <p class="login-kicker">v1.1 · Sign in</p>
      <h1 class="login-title">Choose your persona</h1>
      <p class="login-desc">Select who you are, enter your credentials, and continue to your workspace.</p>

      <div class="login-personas" id="login-personas" role="radiogroup" aria-label="Persona">
        <button type="button" class="login-persona login-persona--athlete active" data-persona="athlete" role="radio" aria-checked="true">
          <span class="login-persona-icon">⚡</span>
          <span class="login-persona-label">Athlete</span>
        </button>
        <button type="button" class="login-persona login-persona--brand" data-persona="brand" role="radio" aria-checked="false">
          <span class="login-persona-icon">🎯</span>
          <span class="login-persona-label">Brand</span>
        </button>
        <button type="button" class="login-persona login-persona--creator" data-persona="creator" role="radio" aria-checked="false">
          <span class="login-persona-icon">🎬</span>
          <span class="login-persona-label">Creator</span>
        </button>
        <button type="button" class="login-persona login-persona--fan" data-persona="fan" role="radio" aria-checked="false">
          <span class="login-persona-icon">📈</span>
          <span class="login-persona-label">Fan</span>
        </button>
        <button type="button" class="login-persona login-persona--admin" data-persona="admin" role="radio" aria-checked="false">
          <span class="login-persona-icon">🛡</span>
          <span class="login-persona-label">Admin</span>
        </button>
      </div>

      <p class="login-persona-hint" id="login-persona-hint">You'll go to your athlete dashboard after sign-in.</p>

      <form class="login-form proto-form" id="login-form" novalidate>
        <div class="form-row">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="username" required />
        </div>
        <div class="form-row">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <p class="login-error" id="login-error" hidden></p>
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-login-submit" id="login-submit-btn">Login</button>
        </div>
      </form>

      <p class="login-note">Prototype demo — any email and password will sign you in.</p>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
